<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postd - Messages</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="/my-app/app/globals.css">
    <link rel="stylesheet" href="/app/CSS/styles.css">
    <script src="/app/JS/script.js" defer></script>
    <script src="/my-app/app/layout.tsx" defer></script>
    <script src="/my-app/app/page.tsx" defer></script>
</head>
<body>

    <!-- Top Navigation -->
    <header class="top-nav">
        <div class="logo">Postd</div>
        <nav>
            <a href="#">Bulletin Board</a>
            <a href="#">Message Drafter</a>
            <a href="#" class="active">Messages</a>
        </nav>

        <div class="right-controls">
            <span>Light Mode</span>
            <label class="switch">
                <input type="checkbox" id="modeToggle">
                <span class="slider"></span>
            </label>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="menu-item active" onclick="showInbox()">📩 Inbox</div>
            <div class="menu-item" onclick="showOutbox()">📤 Outbox</div>
        </aside>

        <!-- Content Area -->
        <main class="content">

            <div id="messageStack" class="message-stack">
                <!-- Stacked Cards -->
                <div class="card card-back-3"></div>
                <div class="card card-back-2"></div>
                <div class="card card-back-1"></div>
                <div class="card card-front">
                    <div class="card-content">
                        <h3>Subject: Project Update</h3>
                        <p>
                            Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                            Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
                        </p>
                        <button class="open-btn">Open Message</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <footer>
        <p>© 2026 Postd</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
