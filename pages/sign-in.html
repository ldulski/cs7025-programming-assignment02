<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postd</title>
    <link rel="stylesheet" href="/my-app/app/globals.css">
    <link rel="stylesheet" href="/app/CSS/pages-styles.css">
    <script src="/app/JS/script.js" defer></script>
    <script src="/my-app/app/layout.tsx" defer></script>
    <script src="/my-app/app/page.tsx" defer></script>
</head>
<body>
<header>
    <div class="logo">Postd</div>

    <nav>
      <div class="toggle"></div>
    </nav>
</header>

  <!-- NAV -->
  <nav>
    <a href="#" class="logo">Postd</a>
    <div class="nav-right">
      <a href="#" class="nav-signin">Sign in</a>
      <label class="toggle-wrap">
        <span class="toggle">
          <input type="checkbox" id="modeToggle" />
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </span>
        Light Mode
      </label>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="login-main">


    <!-- RIGHT -->
    <div class="hero-panel">
      <h2>Sign up</h2>
      <p class="form-sub">Enter your TCD email and password</a></p>

      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap has-icon">
          <span class="icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
          <input type="email" id="email" placeholder="Placeholder" autocomplete="email" />
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap has-icon">
          <span class="icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" placeholder="Placeholder" autocomplete="new-password" />
          <button class="eye-btn" type="button" onclick="togglePassword()" aria-label="Toggle password visibility">
            <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn-primary" type="button">Log in</button>
      <button class="btn-secondary" type="button">Forgot your password?</button>
    </div>

  </main>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    // Light/dark mode toggle (cosmetic swap)
    document.getElementById('modeToggle').addEventListener('change', function () {
      if (this.checked) {
        document.documentElement.style.setProperty('--bg', '#f0f0f0');
        document.documentElement.style.setProperty('--white', '#e8e8e8');
      } else {
        document.documentElement.style.setProperty('--bg', '#fdf3e7');
        document.documentElement.style.setProperty('--white', '#ffffff');
      }
    });
  </script>
</body>
</html>
