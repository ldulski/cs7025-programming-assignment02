<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postd</title>
    <link rel="icon" type="image/x-icon" href="/app/Images/postd-favicon.png">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="/my-app/app/globals.css">
    <link rel="stylesheet" href="/app/CSS/pages-styles.css">
    <script type="module" src="/app/JS/script.js" defer></script>
    <script type="module" src="/app/JS/signin.js"></script>
</head>
<body>
<header>
      <nav aria-label="Main Navigation">
        <div aria-label="Postd Logomark" class="logo"><a href="/pages/index.html">Postd</a></div>
        <div class="toggle"></div>
    </nav>
</header>
  <!-- MAIN -->
  <main class="login-main">

    <div class="hero-sign-in">
      <h2>Sign in</h2>
      <p class="form-sub">Enter your TCD email and password</a></p>

      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap has-icon">
          <span class="icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
          <input type="email" id="email" placeholder="Placeholder" autocomplete="email" required/>
        </div>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap has-icon">
          <span class="icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" placeholder="Placeholder" autocomplete="current-password" required />
          <button class="eye-btn" type="button" onclick="togglePassword()" aria-label="Toggle password visibility">
            <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button id= "signinBtn" class="btn-primary" type="button">Log in</button>
      <button class="btn-secondary" type="button">Forgot your password?</button>
    </div>

  </main>

  <footer>
    <p class=".small-text">© 2026 Postd</p>
<ul class="footer-links">
    <li><a href="/pages/account_external.html">Account</a></li>
    <li><a href="/pages/bulletinboard.html">Bulletin Board</a></li>
    <li><a href="/pages/message_drafter.html">Message Drafter</a></li>
     <li><a href="/pages/message_inbox.html">Messages</a></li>
</ul>
<p class=".small-text">Created for academic purposes as part of the MSc Interactive Digital Media at Trinity College Dublin</p>
</footer>
</body>
</html>
