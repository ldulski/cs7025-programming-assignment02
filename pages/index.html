<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postd</title>
    <link rel="stylesheet" href="/my-app/app/globals.css">
    <link rel="stylesheet" href="/app/CSS/pages-styles.css">
    <script src="/app/JS/script.js" defer></script>
    <script src="/my-app/app/layout.tsx" defer></script>
    <script src="/my-app/app/page.tsx" defer></script>
</head>
<body>
  
<header class="top-nav">
    <nav>
        <ul>
            <li class="logo"><a href="#">Postd</a></li>
            <li><a href="/pages/bulletinboard.html">Bulletin Board</a></li>
            <li><a href="/pages/message_drafter.html">Message Drafter</a></li>
            <li><a href="/pages/messages.html">Messages</a></li>
            <li><a href="/pages/account_external.html">Profile</a></li>
            <li>  <div class="toggle"></div></li>
       </ul> 
    </nav>
</header>

  <!-- MAIN -->
  <main class="index-main">

    <!-- LEFT -->
    <div class="hero-panel">
      <div>
        <p class="hero-eyebrow">Get to know eachother.</p>
        <h1 class="hero-title">Post it.<br>With Postd.</h1>
      </div>
      <p class="hero-body">Send letters, design posters, and advertise events around Trinity College Dublin with Postd. Join Today.</p>
    </div>

    <!-- RIGHT -->
    <div class="form-panel">
      <h2>Sign up</h2>
      <p class="form-sub">or create your account or <a href="#">sign in</a></p>

      <div class="field">
        <label for="name">Your Name</label>
        <div class="input-wrap">
          <input type="text" id="name" placeholder="Placeholder" autocomplete="name" />
        </div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap has-icon">
          <span class="icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
          <input type="email" id="email" placeholder="Placeholder" autocomplete="email" />
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap has-icon">
          <span class="icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" placeholder="Placeholder" autocomplete="new-password" />
          <button class="eye-btn" type="button" onclick="togglePassword()" aria-label="Toggle password visibility">
            <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- add checkbox red mode where you need to check it -->
      <div class="checkbox-row">
        <input type="checkbox" id="terms">
        <label for="terms">I agree to Postd's Conditions of Use and Privacy Notice</label>
      </div>

      <button class="btn-primary" type="button">Create Account</button>
      <button class="btn-secondary" type="button">Login with Trinity Email</button>
    </div>

  </main>

  <!-- <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script> -->
</body>
</html>
