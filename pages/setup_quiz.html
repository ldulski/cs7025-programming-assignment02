<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postd Quiz</title>
    <link rel="stylesheet" href="/my-app/app/globals.css">
    <link rel="stylesheet" href="/app/CSS/pages-styles.css">
    <script src="/app/JS/script.js" defer></script>
    <script src="/app/JS/quiz.js" defer></script>
    <script src="/my-app/app/layout.tsx" defer></script>
    <script src="/my-app/app/page.tsx" defer></script>

</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="#" class="logo">Postd</a>
    <div class="nav-links">
      <a href="#">Bulletin Board</a>
      <a href="#">Message Drafter</a>
      <a href="#">Messages</a>
    </div>
    <div class="nav-right">
      <button class="icon-btn" aria-label="Account">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </button>
      <label class="toggle-wrap">
        <span class="toggle">
          <input type="checkbox" id="modeToggle" />
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </span>
        Light Mode
      </label>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="quiz-main">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill" style="width: 16.67%"></div>
    </div>
    <div class="quiz-viewport" id="quizViewport">
      <!-- called in by quiz.js -->
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <span>© 2026 Postd</span>
    <div class="footer-links">
      <a href="#">Account</a>
      <a href="#">Bulletin Board</a>
      <a href="#">Message Drafter</a>
      <a href="#">Messages</a>
    </div>
    <span>Made by Lorem Ipsum</span>
  </footer>

</body>
</html>
